<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>techprakt2026task1</title>
  </head>
  <body>
	<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f6f6f4;
    --bg-success: #eaf3de;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --text-success: #3b6d11;
    --text-danger: #a32d2d;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.22);
    --border-success: #97c459;
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg-secondary: #2a2a28;
      --bg-success: #173404;
      --text-primary: #f0ede8;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --text-success: #c0dd97;
      --text-danger: #f09595;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.2);
      --border-success: #639922;
    }
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2.5rem 1rem;
  }

  .card {
    background: var(--bg);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 2rem;
    width: 100%;
    max-width: 560px;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 1.5rem;
    letter-spacing: -0.01em;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  .input-row input {
    flex: 1;
    padding: 9px 13px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: box-shadow 0.15s;
  }

  .input-row input::placeholder { color: var(--text-tertiary); }
  .input-row input:focus { box-shadow: 0 0 0 2px var(--border-hover); }

  .btn-add {
    padding: 9px 16px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-add:hover { background: var(--bg-secondary); }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  .stat {
    background: var(--bg-secondary);
    border-radius: var(--radius);
    padding: 10px 12px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .stat-val {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .filters {
    display: flex;
    gap: 5px;
    margin-bottom: 1rem;
  }

  .filters button {
    font-size: 12px;
    padding: 4px 11px;
    border: 0.5px solid var(--border);
    border-radius: 99px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
  }

  .filters button.active {
    border-color: var(--border-hover);
    color: var(--text-primary);
    background: var(--bg-secondary);
  }

  .empty {
    font-size: 14px;
    color: var(--text-tertiary);
    padding: 2rem 0;
    text-align: center;
  }

  .task-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .task {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    transition: border-color 0.12s;
  }

  .task:hover { border-color: var(--border-hover); }
  .task.done .task-text { text-decoration: line-through; color: var(--text-tertiary); }

  .check {
    width: 18px;
    height: 18px;
    border: 0.5px solid var(--border-hover);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.12s;
  }

  .check.checked {
    background: var(--bg-success);
    border-color: var(--border-success);
  }

  .check svg { display: none; }
  .check.checked svg { display: block; }

  .task-text {
    flex: 1;
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.4;
  }

  .btn-del {
    font-size: 15px;
    color: var(--text-tertiary);
    cursor: pointer;
    padding: 2px 4px;
    border: none;
    background: none;
    font-family: inherit;
    line-height: 1;
    transition: color 0.12s;
  }

  .btn-del:hover { color: var(--text-danger); }
</style>
  
	<div class="card">
  <h1>Трекер завдань</h1>

  <div class="input-row">
    <input type="text" id="inp" placeholder="Нове завдання..." />
    <button class="btn-add" onclick="addTask()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/></svg>
      Додати
    </button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Всього</div><div class="stat-val" id="s-all">0</div></div>
    <div class="stat"><div class="stat-label">Активних</div><div class="stat-val" id="s-active">0</div></div>
    <div class="stat"><div class="stat-label">Виконано</div><div class="stat-val" id="s-done">0</div></div>
  </div>

  <div class="filters">
    <button class="active" onclick="setFilter('all', this)">Всі</button>
    <button onclick="setFilter('active', this)">Активні</button>
    <button onclick="setFilter('done', this)">Виконані</button>
  </div>

  <div class="task-list" id="list"></div>
</div>

<script>
let tasks = [];
let filter = 'all';
const inp = document.getElementById('inp');

inp.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

function addTask() {
  const text = inp.value.trim();
  if (!text) return;
  tasks.push({ id: Date.now(), text, done: false });
  inp.value = '';
  render();
}

function toggle(id) {
  const t = tasks.find(t => t.id === id);
  if (t) t.done = !t.done;
  render();
}

function del(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const all = tasks.length;
  const done = tasks.filter(t => t.done).length;
  document.getElementById('s-all').textContent = all;
  document.getElementById('s-active').textContent = all - done;
  document.getElementById('s-done').textContent = done;

  const visible = tasks.filter(t =>
    filter === 'all' ? true : filter === 'done' ? t.done : !t.done
  );

  const list = document.getElementById('list');
  if (!visible.length) {
    list.innerHTML = '<div class="empty">Завдань немає</div>';
    return;
  }

  list.innerHTML = visible.map(t => `
    <div class="task ${t.done ? 'done' : ''}">
      <div class="check ${t.done ? 'checked' : ''}" onclick="toggle(${t.id})">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none" stroke="#3b6d11" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 4,7 9,1"/></svg>
      </div>
      <span class="task-text">${t.text.replace(/</g,'&lt;')}</span>
      <button class="btn-del" onclick="del(${t.id})" title="Видалити">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="2" x2="11" y2="11"/><line x1="11" y1="2" x2="2" y2="11"/></svg>
      </button>
    </div>
  `).join('');
}

render();
</script>
  </body>
</html>
